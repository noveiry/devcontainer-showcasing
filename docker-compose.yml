version: '3.8'

services:
  order-service:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_URLS=http://+:8082
      - PRODUCT_SERVICE_URL=http://product-service:8084
      - INVENTORY_SERVICE_URL=http://inventory-service:8081
      - PAYMENT_SERVICE_URL=http://payment-service:8083
    depends_on:
      - product-service
      - inventory-service
      - payment-service
    networks:
      - microservices-network

  product-service:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - ASPNETCORE_URLS=http://+:8084
    networks:
      - microservices-network

  inventory-service:
    build:
      context: ./InventoryService
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_URLS=http://+:8081
    networks:
      - microservices-network

  payment-service:
    build:
      context: ./PaymentService
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - ASPNETCORE_URLS=http://+:8083
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge