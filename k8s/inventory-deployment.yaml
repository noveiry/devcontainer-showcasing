apiVersion: apps/v1
kind: Deployment
metadata:
  name: InventoryService
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: InventoryService
  template:
    metadata:
      labels:
        app: InventoryService
    spec:
      containers:
      - name: InventoryService
        image: InventoryService:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: PORT
          value: "8081"
---
apiVersion: v1
kind: Service
metadata:
  name: InventoryService
  namespace: microservices
spec:
  selector:
    app: InventoryService
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
  type: ClusterIP